services:
  # ──────────────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────────────

  postgresql:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autonoma
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Temporal
  # ──────────────────────────────────────────────

  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgresql
    ports:
      - "7233:7233"
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:2.34.0
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8233:8080"
    depends_on:
      - temporal

  # ──────────────────────────────────────────────
  # API Server
  # ──────────────────────────────────────────────

  api:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm db:generate && pnpm api"
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgresql:5432/autonoma
      REDIS_URL: redis://redis:6379
      TEMPORAL_ADDRESS: temporal:7233
      API_PORT: "4000"
      NODE_ENV: development
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Frontend
  # ──────────────────────────────────────────────

  ui:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm ui -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      VITE_API_URL: http://localhost:4000
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  node_modules:
